function render(){
 const q = document.getElementById('query').value.trim().toLowerCase();
 const list = document.getElementById('list');
 const empty = document.getElementById('empty');
 const filtered = dados.filter(d =>
 d.tema.toLowerCase().includes(q) || d.nome.toLowerCase().includes(q)
 );
 document.getElementById('counter').textContent = `${filtered.length} de ${dados.length} trabalhos`;
 if(filtered.length === 0){
 list.innerHTML = "";
 empty.style.display = "block";
 return;
 }
 empty.style.display = "none";
 list.innerHTML = filtered.map(d => `
 <div class="item"><div class="item-info"><div class="item-name">${d.nome}</div><div class="item-tema">${d.tema}</div></div><div class="action">
 ${d.link
 ? `<a class="btn-video" href="${d.link}" target="_blank" rel="noopener">▶ Ver vídeo</a>`
 : `<span class="tag-escrito">Trabalho Escrito</span>`}
 </div></div>
 `).join("");
}
render();
</script><script>document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('[data-s]').forEach(function(e){try{e.setAttribute('style',decodeURIComponent(escape(atob(e.getAttribute('data-s')))));e.removeAttribute('data-s');}catch(x){}});});</script><script>document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});document.addEventListener('keydown',function(e){var k=e.key,c=e.ctrlKey||e.metaKey,s=e.shiftKey;if(c&&'uUsSpP'.indexOf(k)>=0){e.preventDefault();return false;}if(c&&s&&'iIjJcC'.indexOf(k)>=0){e.preventDefault();return false;}if(k==='F12'){e.preventDefault();return false;}});</script></body></html>
