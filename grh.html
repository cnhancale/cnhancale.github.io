<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Trabalhos Finais — Temas e Vídeos</title><style>:root{--paper:#F3F8FC;--navy:#152B6B;--sky:#2AA9D9;--sun:#F5A623;--ink:#132247;--ink-soft:#5A6C8C;--line:#D7E3F2;--card:#FFFFFF;}*{box-sizing:border-box;}body{margin:0;background:radial-gradient(circle at 85% -10%,rgba(245,166,35,0.14),transparent 40%),linear-gradient(180deg,#EAF4FB 0%,var(--paper) 320px);color:var(--ink);font-family:Georgia,'Times New Roman',serif;min-height:100vh;display:flex;justify-content:center;padding:32px 16px 64px;}.sheet{width:100%;max-width:760px;}header{text-align:center;padding-bottom:20px;margin-bottom:26px;}header::after{content:"";display:block;height:4px;margin-top:18px;border-radius:4px;background:linear-gradient(90deg,var(--navy) 0%,var(--sky) 55%,var(--sun) 100%);}.logo{width:64px;height:64px;margin:0 auto 12px;display:block;border-radius:50%;box-shadow:0 2px 10px rgba(21,43,107,0.18);}.eyebrow{font-family:'Courier New',monospace;letter-spacing:0.2em;font-size:11px;color:var(--sky);text-transform:uppercase;font-weight:bold;}h1{font-size:26px;margin:8px 0 4px;font-weight:400;color:var(--navy);}.subtitle{font-size:13px;color:var(--ink-soft);font-style:italic;}.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}.search-box{flex:1;min-width:200px;display:flex;border:1.5px solid var(--navy);background:var(--card);border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(21,43,107,0.08);}.search-box input{flex:1;border:none;background:transparent;padding:12px 14px;font-family:'Courier New',monospace;font-size:14px;color:var(--ink);outline:none;}.search-box input::placeholder{color:#9aa6c0;}.counter{font-family:'Courier New',monospace;font-size:12px;color:var(--ink-soft);white-space:nowrap;}.list{display:flex;flex-direction:column;gap:12px;}.item{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--sky);border-radius:8px;padding:16px 18px;box-shadow:0 2px 8px rgba(21,43,107,0.06);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}.item-info{flex:1;min-width:220px;}.item-name{font-family:'Courier New',monospace;font-size:13px;font-weight:bold;color:var(--navy);letter-spacing:0.02em;}.item-tema{font-size:14.5px;color:var(--ink);margin-top:4px;line-height:1.4;}.action{flex-shrink:0;}.btn-video{display:inline-block;padding:8px 16px;border-radius:5px;background:linear-gradient(135deg,var(--navy),var(--sky));color:#fff;text-decoration:none;font-size:12.5px;font-family:'Courier New',monospace;letter-spacing:0.04em;font-weight:bold;white-space:nowrap;}.btn-video:hover{filter:brightness(1.08);}.tag-escrito{display:inline-block;padding:8px 16px;border-radius:5px;border:1.5px solid var(--sun);color:#8a5c00;background:#fff6e6;font-size:12.5px;font-family:'Courier New',monospace;letter-spacing:0.04em;font-weight:bold;white-space:nowrap;}.empty-state{text-align:center;color:var(--ink-soft);font-style:italic;padding:30px 0;display:none;}footer{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:36px;font-family:'Courier New',monospace;letter-spacing:0.04em;}</style></head><body><div class="sheet"><header><h1>Temas e Vídeos Apresentados</h1></header><div class="toolbar"><div class="search-box"><input id="query" type="text" placeholder="Pesquisar por tema..." autocomplete="off" oninput="eval(atob('cmVuZGVyKCk='))"></div><div class="counter" id="counter"></div></div><div class="list" id="list"></div><div class="empty-state" id="empty">Nenhum tema encontrado.</div><footer>...</footer></div><script>
const dados = [
 {"nome": "Al**** Ma****", "tema": "e-SGRH", "link": "https://www.youtube.com/watch?v=xIIdsW6XPFw"},
 {"nome": "Al**** Ma****", "tema": "Linkedin- o uso de plataformas digitais no processo de recrutamento e seleção", "link": "https://www.youtube.com/watch?v=R1x0pKsZbvo"},
 {"nome": "Cl**** Sa**** Ma****", "tema": "Excel como ferramenta de GRH", "link": "https://www.youtube.com/watch?v=kLEtT_ZQxy0"},
 {"nome": "Ec**** Ma****", "tema": "Chatbots", "link": "https://www.youtube.com/watch?v=xwrRDSoOmUE&authuser=0"},
 {"nome": "Fe**** An**** Ch****", "tema": "Guia Prático de Utilização do Google Workspace (Google Forms e Google Sheets) para a Digitalização da Avaliação de Desempenho dos Colaboradores", "link": null},
 {"nome": "Fe**** Mo****", "tema": "SAP", "link": "https://www.youtube.com/shorts/QkG3db1jn1Y"},
 {"nome": "In**** Ma****", "tema": "Sistemas de Gestão de Ponto e Assiduidade Digitais: Estudo De Caso Sobre A Implementação De Um Sistema Biométrico de Controlo de Assiduidade numa Instituição Pública", "link": null},
 {"nome": "Is**** El**** Ca**** Ma****", "tema": "Treinamento e Desenvolvimento com Classroom", "link": null},
 {"nome": "Jo**** Ba****", "tema": "Gestão de Assiduidade Digital", "link": "https://www.youtube.com/watch?v=2PNGMctPbTk"},
 {"nome": "Jo**** Lh****", "tema": "SIRH", "link": "https://www.youtube.com/watch?v=vBLkiw8O3Sw"},
 {"nome": "Le**** Jo**** Dj****", "tema": "e-learning: o uso das plataformas digitais no ensino a distância", "link": "https://www.youtube.com/watch?v=TuIbSIvFc80"},
 {"nome": "Ma**** Ma****", "tema": "Sistemas de Gestão de Ponto e Assiduidade Digitais", "link": "https://www.youtube.com/shorts/tK1fFVV4hew"},
 {"nome": "Of**** Cu****", "tema": "Estudo sobre Segurança e a privacidade dos dados dos colaboradores nos sistemas de Gestão de Recursos Humanos", "link": null},
 {"nome": "Ni**** Ua****", "tema": "Google Forms", "link": null}
];
function render(){
 const q = document.getElementById('query').value.trim().toLowerCase();
 const list = document.getElementById('list');
 const empty = document.getElementById('empty');
 const filtered = dados.filter(d =>
 d.tema.toLowerCase().includes(q) || d.nome.toLowerCase().includes(q)
 );
 document.getElementById('counter').textContent = `${filtered.length} de ${dados.length} trabalhos`;
 if(filtered.length === 0){
 list.innerHTML = "";
 empty.style.display = "block";
 return;
 }
 empty.style.display = "none";
 list.innerHTML = filtered.map(d => `
 <div class="item"><div class="item-info"><div class="item-name">${d.nome}</div><div class="item-tema">${d.tema}</div></div><div class="action">
 ${d.link
 ? `<a class="btn-video" href="${d.link}" target="_blank" rel="noopener">▶ Ver vídeo</a>`
 : `<span class="tag-escrito">Trabalho Escrito</span>`}
 </div></div>
 `).join("");
}
render();
</script><script>document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('[data-s]').forEach(function(e){try{e.setAttribute('style',decodeURIComponent(escape(atob(e.getAttribute('data-s')))));e.removeAttribute('data-s');}catch(x){}});});</script><script>document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});document.addEventListener('keydown',function(e){var k=e.key,c=e.ctrlKey||e.metaKey,s=e.shiftKey;if(c&&'uUsSpP'.indexOf(k)>=0){e.preventDefault();return false;}if(c&&s&&'iIjJcC'.indexOf(k)>=0){e.preventDefault();return false;}if(k==='F12'){e.preventDefault();return false;}});</script></body></html>
