function norm(s){
 return (s || "").toString().toLowerCase().replace(/[.\s]/g,"");
}
function fmt(v){
 if(v === null || v === undefined) return "—";
 return Number.isInteger(v) ? v.toString() : v.toFixed(2);
}
function badgeClass(res){
 const r = res.toLowerCase();
 if(r === "aprovado") return "aprovado";
 if(r === "dispensado") return "dispensado";
 return "recorrencia";
}
function lookup(){
 const raw = document.getElementById('query').value.trim();
 const box = document.getElementById('result');
 if(!raw){
 box.innerHTML = '<div class="empty">Aguardando o número de estudante…</div>';
 return;
 }
 const q = norm(raw);
 const found = dados.find(d => d.n && norm(d.n).includes(q) && q.length >= 3);
 if(!found){
 box.innerHTML = `
 <div class="not-found"><strong>Nenhum resultado encontrado</strong>
 Verifique o número de estudante e tente novamente.
 </div>`;
 return;
 }
 box.innerHTML = `
 <div class="card"><div class="num">${found.n || "Nº não disponível"}</div><div class="name">${found.nome}</div><table class="grades"><tr><td class="label">Teste 1 (35%)</td><td class="value">${fmt(found.t1)}</td></tr><tr><td class="label">Teste 2 (35%)</td><td class="value">${fmt(found.t2)}</td></tr><tr><td class="label">Trabalho(30%)</td><td class="value">${fmt(found.trab)}</td></tr><tr><td class="label">Média de Frequência</td><td class="value">${fmt(found.mf)}</td></tr><tr><td class="label">Situação</td><td class="value">${found.sit}</td></tr><tr><td class="label">Exame</td><td class="value">${fmt(found.ex)}</td></tr><tr><td class="label">Média Final</td><td class="value">${fmt(found.mfinal)}</td></tr></table><div class="status-row"><span class="label">Resultado</span><span class="badge ${badgeClass(found.res)}">${found.res}</span></div></div>`;
}
document.getElementById('query').addEventListener('keydown', function(e){
 if(e.key === 'Enter') lookup();
});
